{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "substream-backend.fullname" . }}-hpa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "substream-backend.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "substream-backend.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleDownStabilizationSeconds }}
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: {{ .Values.autoscaling.scaleUpPercent }}
        periodSeconds: {{ .Values.autoscaling.scaleUpPeriodSeconds }}
      - type: Pods
        value: {{ .Values.autoscaling.scaleUpPods }}
        periodSeconds: {{ .Values.autoscaling.scaleUpPeriodSeconds }}
      selectPolicy: Max
{{- end }}
