global:
  environment: staging
  imagePullSecrets: []
  domain: api.staging.substream.example.com

image:
  repository: substream/backend
  tag: staging
  pullPolicy: Always

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: api.staging.substream.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - api.staging.substream.example.com
      secretName: substream-staging-tls

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

affinity:
  enabled: true
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution: true
    topologyKey: kubernetes.io/hostname

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  - name: NODE_ENV
    value: "staging"
  - name: PORT
    value: "3000"
  - name: REDIS_HOST
    value: "redis-staging"
  - name: REDIS_PORT
    value: "6379"
  - name: VAULT_ENABLED
    value: "true"
  - name: VAULT_ADDR
    value: "http://vault-staging:8200"

configmap:
  enabled: true
  data:
    s3-bucket: substream-staging-assets
    s3-region: us-east-1
    soroban-rpc-url: https://soroban-rpc.staging.example.com
    soroban-network-passphrase: Test SDF Network ; September 2015
    soroban-contract-id: ""

persistence:
  enabled: false

networkPolicy:
  enabled: true

terminationGracePeriodSeconds: 30