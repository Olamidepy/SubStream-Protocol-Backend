{{- if .Values.configmap.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "substream-backend.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "substream-backend.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.configmap.data | nindent 2 }}
{{- end -}}